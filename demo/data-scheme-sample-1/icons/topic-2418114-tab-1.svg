<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <!-- market share falling below 50% - pie chart with decline -->
  <!-- pie chart -->
  <circle cx="46" cy="46" r="26" fill="#2563EB" />
  <!-- slice removed (share lost) -->
  <path d="M46 46L20 36A26 26 0 0 1 46 20L46 46Z" fill="#60A5FA" />
  <!-- 46.4% remaining -->
  <text x="46" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFF">46%</text>
  <!-- arrow pointing down -->
  <path d="M80 32L80 62" stroke="#DC2626" stroke-width="4" stroke-linecap="round" />
  <path d="M72 54L80 66L88 54" stroke="#DC2626" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  <!-- 50% threshold line -->
  <line x1="12" y1="20" x2="30" y2="20" stroke="#DC2626" stroke-width="2" stroke-dasharray="4 3" />
  <text x="8" y="16" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#DC2626">50%</text>
</svg>
