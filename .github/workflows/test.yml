name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # bun 版本与 package.json 的 packageManager 字段保持一致（bun@1.3.12）。
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      # 从 ingest/go.mod 读取 go 版本（go 1.21），避免与本地开发脱节。
      - name: Read Go version from ingest/go.mod
        id: go-version
        run: |
          version=$(grep -E '^go [0-9]+\.[0-9]+' ingest/go.mod | awk '{print $2}')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.go-version.outputs.version }}
          # ingest 模块只用标准库（无外部依赖），没有 go.sum；缓存键锚定 go.mod 即可。
          cache-dependency-path: ingest/go.mod

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Run JS unit tests
        run: bun run test:unit

      - name: Run JS integration tests
        # 纯 JS 逻辑校验（不含 Remotion 渲染，秒级）。渲染冒烟见下方 test:render。
        run: bun run test:integration

      - name: Ensure Remotion browser
        # render 冒烟每帧 spawn Chromium；提前 ensure 一次 Chrome for Testing，避免首个 remotion still 在线下载拖慢/失败。
        run: bunx remotion browser ensure

      - name: Run JS render smoke tests
        # Remotion 渲染冒烟：各关键帧 + 布局组合渲染成 1920×1080 PNG，断言不崩 + 非空白。
        # 抓「某帧整段崩渲染」类回归（如 overlay 短场景的 interpolate 退化区间）。
        run: bun run test:render

      - name: Run Go tests
        run: go -C ingest test ./...
