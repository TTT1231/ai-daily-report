<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <!-- multiple investors around central value -->
  <!-- central coin -->
  <circle cx="48" cy="48" r="16" fill="#FBBF24" />
  <circle cx="48" cy="48" r="12" fill="#F59E0B" />
  <text x="48" y="53" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#92400E">¥</text>
  <!-- investor figures around -->
  <!-- top -->
  <circle cx="48" cy="16" r="7" fill="#7C3AED" />
  <rect x="44" y="24" width="8" height="10" rx="3" fill="#7C3AED" />
  <!-- right -->
  <circle cx="78" cy="38" r="7" fill="#0891B2" />
  <rect x="74" y="46" width="8" height="10" rx="3" fill="#0891B2" />
  <!-- bottom -->
  <circle cx="48" cy="78" r="7" fill="#E11D48" />
  <rect x="44" y="70" width="8" height="10" rx="3" fill="#E11D48" />
  <!-- left -->
  <circle cx="18" cy="38" r="7" fill="#059669" />
  <rect x="14" y="46" width="8" height="10" rx="3" fill="#059669" />
  <!-- top-right -->
